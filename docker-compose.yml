version: '3.8'

# Fundamento: Arquitectura Orientada a Servicios (SOA / Service-Oriented Architecture).
# Se definen bloques lógicos independientes que se comunican a través de una red interna.
services:
  db:
    image: postgres:15-alpine
    # Fundamento: Inyección de Dependencias a través de Variables de Entorno.
    # Desacopla las credenciales del código fuente.
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: autopoiesis_db
    ports:
      - "5432:5432"
    # Fundamento: Persistencia de Datos (Volúmenes).
    # Evita que los datos mueran cuando el contenedor de la base de datos se apague o reinicie.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Fundamento: Auto-aprovisionamiento (Seed). Monta el script local[cite: 2] en el directorio de arranque.
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      # Fundamento: Cadena de Conexión Dinámica.
      # Se usa el nombre del servicio ('db') como host gracias al DNS interno de Docker.
      DATABASE_URL: postgresql://admin:password123@db:5432/autopoiesis_db
    # Fundamento: Control de Dependencia de Arranque.
    # Garantiza que el backend no intente conectarse antes de que el motor SQL esté listo.
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    # Fundamento: Variables de Entorno en Tiempo de Construcción/Ejecución.
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    # Fundamento: Recarga en Caliente (Hot Reloading). 
    # Sincroniza los archivos locales con el contenedor para desarrollo fluido.
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: