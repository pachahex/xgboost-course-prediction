services:
  backend:
    volumes:
      - ./backend:/app
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000"]

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  frontend_node_modules:
